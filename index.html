<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Hematimétrica</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>
<body class="h-full bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 overflow-auto">
  <div class="min-h-full w-full flex items-center justify-center p-6">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-red-600 rounded-2xl mb-4 shadow-lg shadow-red-600/30">
          <i data-lucide="droplets" class="w-8 h-8 text-white"></i>
        </div>
        <h1 id="app-title" class="text-2xl font-bold text-white mb-2">Índices Hematimétricos</h1>
        <p class="text-slate-400 text-sm">Insira o valor do hematócrito para calcular</p>
      </div>
      <div class="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50 mb-6">
        <label class="block text-slate-300 text-sm font-medium mb-3"> Hematócrito (Ht) </label>
        <div class="relative">
          <input type="number" id="ht-input" placeholder="Ex: 45" step="0.1" min="0" max="100" class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-4 text-white text-lg placeholder-slate-500 focus:outline-none focus:border-red-500 input-glow transition-all">
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">%</span>
        </div>
      </div>
      <div id="results-container" class="hidden">
        <h2 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-4 flex items-center gap-2">
          <i data-lucide="calculator" class="w-4 h-4"></i> Resultados
        </h2>
        <div id="results-grid" class="space-y-3"></div>
        <div class="mt-6 p-4 bg-slate-800/30 rounded-xl border border-slate-700/30">
          <p class="text-slate-500 text-xs font-medium uppercase tracking-wider mb-2">Fórmulas utilizadas</p>
          <div class="text-slate-400 text-xs space-y-1 font-mono">
            <p>H = (Ht + 4) / 10</p>
            <p>Hb = Ht / 3</p>
            <p>VCM = (Ht × 10) / H</p>
            <p>HCM = (Hb × 10) / H</p>
            <p>CHCM = (Hb × 100) / Ht</p>
          </div>
        </div>
      </div>
      <div id="empty-state" class="text-center py-8">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-slate-800 rounded-full mb-3">
          <i data-lucide="flask-conical" class="w-6 h-6 text-slate-500"></i>
        </div>
        <p class="text-slate-500 text-sm">Digite o valor do Ht para ver os resultados</p>
      </div>
    </div>
  </div>
  <script src="js/script.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
