<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Hematimétrica</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
    }
    .result-card {
      animation: slideUp 0.4s ease-out forwards;
      opacity: 0;
      transform: translateY(10px);
    }
    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .result-card:nth-child(1) { animation-delay: 0.05s; }
    .result-card:nth-child(2) { animation-delay: 0.1s; }
    .result-card:nth-child(3) { animation-delay: 0.15s; }
    .result-card:nth-child(4) { animation-delay: 0.2s; }
    .result-card:nth-child(5) { animation-delay: 0.25s; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 overflow-auto">
  <div class="min-h-full w-full flex items-center justify-center p-6">
   <div class="w-full max-w-md"><!-- Header -->
    <div class="text-center mb-8">
     <div class="inline-flex items-center justify-center w-16 h-16 bg-red-600 rounded-2xl mb-4 shadow-lg shadow-red-600/30"><i data-lucide="droplets" class="w-8 h-8 text-white"></i>
     </div>
     <h1 id="app-title" class="text-2xl font-bold text-white mb-2">Índices Hematimétricos</h1>
     <p class="text-slate-400 text-sm">Insira o valor do hematócrito para calcular</p>
    </div><!-- Input Card -->
    <div class="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50 mb-6"><label class="block text-slate-300 text-sm font-medium mb-3"> Hematócrito (Ht) </label>
     <div class="relative"><input type="number" id="ht-input" placeholder="Ex: 45" step="0.1" min="0" max="100" class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-4 text-white text-lg placeholder-slate-500 focus:outline-none focus:border-red-500 input-glow transition-all"> <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">%</span>
     </div>
    </div><!-- Results -->
    <div id="results-container" class="hidden">
     <h2 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-4 flex items-center gap-2"><i data-lucide="calculator" class="w-4 h-4"></i> Resultados</h2>
     <div id="results-grid" class="space-y-3"><!-- Results will be inserted here -->
     </div><!-- Formulas Reference -->
     <div class="mt-6 p-4 bg-slate-800/30 rounded-xl border border-slate-700/30">
      <p class="text-slate-500 text-xs font-medium uppercase tracking-wider mb-2">Fórmulas utilizadas</p>
      <div class="text-slate-400 text-xs space-y-1 font-mono">
       <p>H = (Ht + 4) / 10</p>
       <p>Hb = Ht / 3</p>
       <p>VCM = (Ht × 10) / H</p>
       <p>HCM = (Hb × 10) / H</p>
       <p>CHCM = (Hb × 100) / Ht</p>
      </div>
     </div>
    </div><!-- Empty State -->
    <div id="empty-state" class="text-center py-8">
     <div class="inline-flex items-center justify-center w-12 h-12 bg-slate-800 rounded-full mb-3"><i data-lucide="flask-conical" class="w-6 h-6 text-slate-500"></i>
     </div>
     <p class="text-slate-500 text-sm">Digite o valor do Ht para ver os resultados</p>
    </div>
   </div>
  </div>
  <script>
    // Default configuration
    const defaultConfig = {
      app_title: 'Índices Hematimétricos',
      primary_color: '#dc2626',
      background_color: '#0f172a',
      surface_color: '#1e293b',
      text_color: '#ffffff',
      secondary_text_color: '#94a3b8'
    };
 
    let config = { ...defaultConfig };
 
    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (newConfig) => {
          config = { ...defaultConfig, ...newConfig };
          applyConfig();
        },
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.background_color || defaultConfig.background_color,
              set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
            },
            {
              get: () => cfg.surface_color || defaultConfig.surface_color,
              set: (v) => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
            },
            {
              get: () => cfg.text_color || defaultConfig.text_color,
              set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
            },
            {
              get: () => cfg.primary_color || defaultConfig.primary_color,
              set: (v) => { cfg.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
            },
            {
              get: () => cfg.secondary_text_color || defaultConfig.secondary_text_color,
              set: (v) => { cfg.secondary_text_color = v; window.elementSdk.setConfig({ secondary_text_color: v }); }
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ['app_title', cfg.app_title || defaultConfig.app_title]
        ])
      });
    }
 
    function applyConfig() {
      const title = document.getElementById('app-title');
      if (title) {
        title.textContent = config.app_title || defaultConfig.app_title;
        title.style.color = config.text_color || defaultConfig.text_color;
      }
 
      document.body.style.background = `linear-gradient(135deg, ${config.background_color || defaultConfig.background_color}, ${config.surface_color || defaultConfig.surface_color})`;
    }
 
    // Calculate hematological indices
    function calculateIndices(ht) {
      const H = (ht + 4) / 10;
      const Hb = ht / 3;
      const VCM = (ht * 10) / H;
      const HCM = (Hb * 10) / H;
      const CHCM = (Hb * 100) / ht;
 
      return { H, Hb, VCM, HCM, CHCM };
    }
 
    // Render results
    function renderResults(indices) {
      const resultsData = [
        { label: 'Hemácias (H)', value: indices.H.toFixed(2), unit: 'milhões/mm³', icon: 'circle-dot' },
        { label: 'Hemoglobina (Hb)', value: indices.Hb.toFixed(2), unit: 'g/dL', icon: 'droplet' },
        { label: 'VCM', value: indices.VCM.toFixed(2), unit: 'fL', icon: 'box' },
        { label: 'HCM', value: indices.HCM.toFixed(2), unit: 'pg', icon: 'target' },
        { label: 'CHCM', value: indices.CHCM.toFixed(2), unit: 'g/dL', icon: 'percent' }
      ];
 
      const grid = document.getElementById('results-grid');
      grid.innerHTML = resultsData.map(item => `
        <div class="result-card bg-slate-800/50 backdrop-blur-sm rounded-xl p-4 border border-slate-700/50 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600/20 rounded-lg flex items-center justify-center">
              <i data-lucide="${item.icon}" class="w-5 h-5 text-red-500"></i>
            </div>
            <div>
              <p class="text-slate-400 text-sm">${item.label}</p>
              <p class="text-white font-semibold text-lg">${item.value}</p>
            </div>
          </div>
          <span class="text-slate-500 text-sm">${item.unit}</span>
        </div>
      `).join('');
 
      lucide.createIcons();
    }
 
    // Handle input changes
    const htInput = document.getElementById('ht-input');
    const resultsContainer = document.getElementById('results-container');
    const emptyState = document.getElementById('empty-state');
 
    htInput.addEventListener('input', function() {
      const value = parseFloat(this.value);
 
      if (!isNaN(value) && value > 0 && value <= 100) {
        const indices = calculateIndices(value);
        renderResults(indices);
        resultsContainer.classList.remove('hidden');
        emptyState.classList.add('hidden');
      } else {
        resultsContainer.classList.add('hidden');
        emptyState.classList.remove('hidden');
      }
    });
 
    // Initialize Lucide icons
    lucide.createIcons();
    applyConfig();
  </script>

</html>
